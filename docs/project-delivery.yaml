openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

info:
  title: Project Delivery API
  version: v1
  summary: API for managing organizations, projects, tasks, comments, members, and reports.
  description: >
    The Project Delivery API allows teams to manage projects, assign work,
    track progress, collaborate through comments, and generate delivery reports.
    This mock specification is suitable for documentation demos, SDK generation,
    contract testing, and Redocly reference pages.
  termsOfService: https://example.com/terms
  contact:
    name: API Support
    email: support@example.com
    url: https://example.com/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://sandbox-api.example.com/v1
    description: Sandbox

tags:
  - name: Organizations
    description: Manage organizations and organization-level metadata.
  - name: Projects
    description: Create and manage projects, milestones, and project lifecycle data.
  - name: Tasks
    description: Create, update, assign, and track work items within projects.
  - name: Comments
    description: Collaborate on tasks using threaded comments.
  - name: Members
    description: Manage project members and organization membership.
  - name: Reports
    description: Retrieve summary and analytics reports.
  - name: Webhooks
    description: Manage webhook endpoints and delivery configuration.
  - name: Health
    description: Service health and metadata endpoints.

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Get service health
      description: Returns the current service health and version information.
      security: []
      responses:
        '200':
          description: Service health response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/healthStatus'

  /organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List organizations
      description: Returns a paginated list of organizations available to the authenticated user.
      parameters:
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/pageToken'
        - name: search
          in: query
          description: Filter by organization name.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: A paginated list of organizations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organizationList'
        '401':
          $ref: '#/components/responses/unauthorized'
    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createOrganizationRequest'
      responses:
        '201':
          description: Organization created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organization'
        '400':
          $ref: '#/components/responses/badRequest'
        '409':
          $ref: '#/components/responses/conflict'

  /organizations/{organizationId}:
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get organization
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: Organization details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organization'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/notFound'
    patch:
      tags: [Organizations]
      operationId: updateOrganization
      summary: Update organization
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateOrganizationRequest'
      responses:
        '200':
          description: Organization updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organization'
        '400':
          $ref: '#/components/responses/badRequest'
        '404':
          $ref: '#/components/responses/notFound'
    delete:
      tags: [Organizations]
      operationId: deleteOrganization
      summary: Delete organization
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '204':
          description: Organization deleted.
        '404':
          $ref: '#/components/responses/notFound'

  /organizations/{organizationId}/members:
    get:
      tags: [Members]
      operationId: listOrganizationMembers
      summary: List organization members
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/pageToken'
        - name: role
          in: query
          description: Filter members by role.
          schema:
            $ref: '#/components/schemas/memberRole'
      responses:
        '200':
          description: Paginated member list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/memberList'
        '404':
          $ref: '#/components/responses/notFound'
    post:
      tags: [Members]
      operationId: inviteOrganizationMember
      summary: Invite organization member
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/inviteMemberRequest'
      responses:
        '201':
          description: Invitation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/member'
        '400':
          $ref: '#/components/responses/badRequest'
        '409':
          $ref: '#/components/responses/conflict'

  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects
      description: Returns projects available to the authenticated user.
      parameters:
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/pageToken'
        - name: organizationId
          in: query
          description: Filter by organization.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by project status.
          schema:
            $ref: '#/components/schemas/projectStatus'
        - name: ownerId
          in: query
          description: Filter by project owner.
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          description: Search by project name or key.
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projectList'
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createProjectRequest'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/project'
        '400':
          $ref: '#/components/responses/badRequest'

  /projects/{projectId}:
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get project
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: Project details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/project'
        '404':
          $ref: '#/components/responses/notFound'
    patch:
      tags: [Projects]
      operationId: updateProject
      summary: Update project
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateProjectRequest'
      responses:
        '200':
          description: Project updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/project'
        '400':
          $ref: '#/components/responses/badRequest'
        '404':
          $ref: '#/components/responses/notFound'
    delete:
      tags: [Projects]
      operationId: archiveProject
      summary: Archive project
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '204':
          description: Project archived.
        '404':
          $ref: '#/components/responses/notFound'

  /projects/{projectId}/members:
    get:
      tags: [Members]
      operationId: listProjectMembers
      summary: List project members
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: Project members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/memberList'
        '404':
          $ref: '#/components/responses/notFound'
    post:
      tags: [Members]
      operationId: addProjectMember
      summary: Add project member
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/addProjectMemberRequest'
      responses:
        '201':
          description: Project member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/member'
        '400':
          $ref: '#/components/responses/badRequest'
        '404':
          $ref: '#/components/responses/notFound'

  /projects/{projectId}/tasks:
    get:
      tags: [Tasks]
      operationId: listTasks
      summary: List tasks in project
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/pageToken'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/taskStatus'
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/taskPriority'
        - name: assigneeId
          in: query
          schema:
            type: string
            format: uuid
        - name: dueBefore
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated task list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/taskList'
        '404':
          $ref: '#/components/responses/notFound'
    post:
      tags: [Tasks]
      operationId: createTask
      summary: Create task
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createTaskRequest'
      responses:
        '201':
          description: Task created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/task'
        '400':
          $ref: '#/components/responses/badRequest'

  /projects/{projectId}/tasks/{taskId}:
    get:
      tags: [Tasks]
      operationId: getTask
      summary: Get task
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
      responses:
        '200':
          description: Task details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/task'
        '404':
          $ref: '#/components/responses/notFound'
    patch:
      tags: [Tasks]
      operationId: updateTask
      summary: Update task
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateTaskRequest'
      responses:
        '200':
          description: Task updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/task'
        '400':
          $ref: '#/components/responses/badRequest'
        '404':
          $ref: '#/components/responses/notFound'
    delete:
      tags: [Tasks]
      operationId: deleteTask
      summary: Delete task
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
      responses:
        '204':
          description: Task deleted.
        '404':
          $ref: '#/components/responses/notFound'

  /projects/{projectId}/tasks/{taskId}/comments:
    get:
      tags: [Comments]
      operationId: listTaskComments
      summary: List task comments
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
      responses:
        '200':
          description: Task comments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/commentList'
        '404':
          $ref: '#/components/responses/notFound'
    post:
      tags: [Comments]
      operationId: createTaskComment
      summary: Create task comment
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createCommentRequest'
      responses:
        '201':
          description: Comment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/comment'
        '400':
          $ref: '#/components/responses/badRequest'

  /projects/{projectId}/tasks/{taskId}/comments/{commentId}:
    delete:
      tags: [Comments]
      operationId: deleteTaskComment
      summary: Delete task comment
      parameters:
        - $ref: '#/components/parameters/projectId'
        - $ref: '#/components/parameters/taskId'
        - $ref: '#/components/parameters/commentId'
      responses:
        '204':
          description: Comment deleted.
        '404':
          $ref: '#/components/responses/notFound'

  /reports/portfolio-summary:
    get:
      tags: [Reports]
      operationId: getPortfolioSummary
      summary: Get portfolio summary
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Portfolio report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/portfolioSummaryReport'
        '400':
          $ref: '#/components/responses/badRequest'

  /webhooks:
    get:
      tags: [Webhooks]
      operationId: listWebhooks
      summary: List webhooks
      responses:
        '200':
          description: Configured webhooks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhookList'
    post:
      tags: [Webhooks]
      operationId: createWebhook
      summary: Create webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createWebhookRequest'
      responses:
        '201':
          description: Webhook created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhook'
        '400':
          $ref: '#/components/responses/badRequest'

  /webhooks/{webhookId}:
    get:
      tags: [Webhooks]
      operationId: getWebhook
      summary: Get webhook
      parameters:
        - $ref: '#/components/parameters/webhookId'
      responses:
        '200':
          description: Webhook details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhook'
        '404':
          $ref: '#/components/responses/notFound'
    patch:
      tags: [Webhooks]
      operationId: updateWebhook
      summary: Update webhook
      parameters:
        - $ref: '#/components/parameters/webhookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateWebhookRequest'
      responses:
        '200':
          description: Webhook updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhook'
        '400':
          $ref: '#/components/responses/badRequest'
        '404':
          $ref: '#/components/responses/notFound'
    delete:
      tags: [Webhooks]
      operationId: deleteWebhook
      summary: Delete webhook
      parameters:
        - $ref: '#/components/parameters/webhookId'
      responses:
        '204':
          description: Webhook deleted.
        '404':
          $ref: '#/components/responses/notFound'

components:
  parameters:
    organizationId:
      name: organizationId
      in: path
      required: true
      description: Organization identifier.
      schema:
        type: string
        format: uuid

    projectId:
      name: projectId
      in: path
      required: true
      description: Project identifier.
      schema:
        type: string
        format: uuid

    taskId:
      name: taskId
      in: path
      required: true
      description: Task identifier.
      schema:
        type: string
        format: uuid

    commentId:
      name: commentId
      in: path
      required: true
      description: Comment identifier.
      schema:
        type: string
        format: uuid

    webhookId:
      name: webhookId
      in: path
      required: true
      description: Webhook identifier.
      schema:
        type: string
        format: uuid

    pageSize:
      name: pageSize
      in: query
      description: Number of items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    pageToken:
      name: pageToken
      in: query
      description: Cursor token for pagination.
      schema:
        type: string

  responses:
    badRequest:
      description: Bad request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'

    unauthorized:
      description: Authentication required or token invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'

    notFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'

    conflict:
      description: Conflict with existing resource state.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    problem:
      type: object
      description: Problem Details JSON Object as defined by RFC 7807.
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
            required: [field, message]
            additionalProperties: false
      required: [title, status]
      additionalProperties: false

    pagination:
      type: object
      properties:
        nextPageToken:
          type:
            - string
            - 'null'
        pageSize:
          type: integer
      required: [pageSize]
      additionalProperties: false

    healthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        version:
          type: string
          examples: [v1.4.2]
        timestamp:
          type: string
          format: date-time
      required: [status, version, timestamp]
      additionalProperties: false

    memberRole:
      type: string
      enum:
        - owner
        - admin
        - manager
        - contributor
        - viewer

    memberStatus:
      type: string
      enum:
        - invited
        - active
        - suspended

    projectStatus:
      type: string
      enum:
        - planned
        - active
        - on_hold
        - completed
        - archived

    taskStatus:
      type: string
      enum:
        - backlog
        - todo
        - in_progress
        - blocked
        - done
        - canceled

    taskPriority:
      type: string
      enum:
        - low
        - medium
        - high
        - urgent

    webhookEvent:
      type: string
      enum:
        - project.created
        - project.updated
        - task.created
        - task.updated
        - task.deleted
        - comment.created

    organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 2
          maxLength: 100
        slug:
          type: string
          pattern: '^[a-z0-9-]{3,50}$'
        plan:
          type: string
          enum: [free, team, business, enterprise]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, slug, plan, createdAt, updatedAt]
      additionalProperties: false

    createOrganizationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        slug:
          type: string
          pattern: '^[a-z0-9-]{3,50}$'
      required: [name, slug]
      additionalProperties: false

    updateOrganizationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
      additionalProperties: false

    organizationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/organization'
        pagination:
          $ref: '#/components/schemas/pagination'
      required: [data, pagination]
      additionalProperties: false

    member:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/memberRole'
        status:
          $ref: '#/components/schemas/memberStatus'
        joinedAt:
          type:
            - string
            - 'null'
          format: date-time
      required: [id, userId, email, displayName, role, status, joinedAt]
      additionalProperties: false

    memberList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/member'
        pagination:
          $ref: '#/components/schemas/pagination'
      required: [data, pagination]
      additionalProperties: false

    inviteMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/memberRole'
      required: [email, role]
      additionalProperties: false

    addProjectMemberRequest:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/memberRole'
      required: [userId, role]
      additionalProperties: false

    project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        key:
          type: string
          pattern: '^[A-Z][A-Z0-9]{1,9}$'
        name:
          type: string
          minLength: 3
          maxLength: 150
        description:
          type:
            - string
            - 'null'
        status:
          $ref: '#/components/schemas/projectStatus'
        ownerId:
          type: string
          format: uuid
        startDate:
          type:
            - string
            - 'null'
          format: date
        targetDate:
          type:
            - string
            - 'null'
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - key
        - name
        - description
        - status
        - ownerId
        - startDate
        - targetDate
        - createdAt
        - updatedAt
      additionalProperties: false

    createProjectRequest:
      type: object
      properties:
        organizationId:
          type: string
          format: uuid
        key:
          type: string
          pattern: '^[A-Z][A-Z0-9]{1,9}$'
        name:
          type: string
          minLength: 3
          maxLength: 150
        description:
          type: string
          maxLength: 5000
        ownerId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
      required: [organizationId, key, name, ownerId]
      additionalProperties: false

    updateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 150
        description:
          type: string
          maxLength: 5000
        status:
          $ref: '#/components/schemas/projectStatus'
        ownerId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
      additionalProperties: false

    projectList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/project'
        pagination:
          $ref: '#/components/schemas/pagination'
      required: [data, pagination]
      additionalProperties: false

