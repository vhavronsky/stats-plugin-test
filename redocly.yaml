extends:
  - recommended

# Search configuration
search: {}

# Breadcrumbs configuration
breadcrumbs: {}

# SEO configuration
seo:
  title: "Local AI Worker Portal"

# Logo and favicon configuration
# logo:
#   src: images/logo.svg
#   favicon: images/favicon.png
#   link: /

# API definitions
apis:
  apis/openapi.yaml:
    root: apis/openapi.yaml
  apis/openapi-secondary.yaml:
    root: apis/openapi-secondary.yaml

# API catalog configuration
catalogClassic:
  api-catalog:
    title: "API Catalog"
    slug: /api-catalog/
    description: "Explore the APIs for the Local AI Worker."
    directory: ./apis/
    includeByMetadata:
      all: true
    filters:
      - title

# Footer configuration
footer:
  copyrightText: "© 2026 Local AI Worker"
  items:
    - group: Product
      items:
        - label: Documentation
          page: docs/index.md
        - label: "API Catalog"
          page: /api-catalog/
    - group: Community
      items:
        - label: GitHub
          href: https://github.com/

navbar:
  items:
    - label: Home
      page: index.page.tsx
    - label: Documentation
      page: docs/index.md
    - label: "API Catalog"
      page: /api-catalog/
